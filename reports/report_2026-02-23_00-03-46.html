        // ---------------------------------------------------------
        // CHART DRAWING FUNCTIONS

        function drawTrendChart() {
            if (!google.visualization) return;
            const data = new google.visualization.DataTable();
            data.addColumn('string', 'Semana');
            data.addColumn('number', 'My Clicks');
            data.addColumn('number', 'Comp Clicks');
            data.addColumn('number', 'My Share (%)');
            
            marketData.trend.forEach(t => {
                data.addRow([t.week, t.my_clicks, t.comp_clicks, t.my_share]);
            });

            const options = {
                title: 'Tendencia Global: Volumen vs Cuota',
                vAxes: {0: {title: 'Clicks Totales'}, 1: {title: 'Click Share (%)', format: '#\'%\''}},
                hAxis: {title: 'Semana'},
                seriesType: 'bars',
                series: {2: {type: 'line', targetAxisIndex: 1}},
                colors: ['#4285F4', '#E0E0E0', '#FBBC04'],
                legend: {position: 'bottom'},
                chartArea: {width: '80%', height: '70%'}
            };

            const chart = new google.visualization.ComboChart(document.getElementById('trend_chart'));
            chart.draw(data, options);
        }

        function drawCompChart() {
            if (!google.visualization) return;
            const data = new google.visualization.DataTable();
            data.addColumn('string', 'Semana');
            
            // Dynamic Columns based on keys in first entry
            const keys = Object.keys(marketData.competitiveness[0]).filter(k => k !== 'week');
            keys.forEach(k => data.addColumn('number', k));
            
            marketData.competitiveness.forEach(item => {
                const row = [item.week];
                keys.forEach(k => row.push(item[k]));
                data.addRow(row);
            });

            const options = {
                title: 'Evolución de Click Share por Marca',
                curveType: 'function',
                legend: { position: 'bottom' },
                // Force "My Brand" to be Blue, others variations
                colors: ['#4285F4', '#EA4335', '#FBBC04', '#34A853', '#9AA0A6'],
                chartArea: {width: '85%', height: '70%'},
                vAxis: {format: '#\'%\''}
            };

            const chart = new google.visualization.LineChart(document.getElementById('comp_chart'));
            chart.draw(data, options);
        }

        function drawEfficiencyChart() {
            if (!google.visualization) return;
            const data = new google.visualization.DataTable();
            data.addColumn('number', 'Organic Rank');
            data.addColumn('number', 'Click Share (%)');
            data.addColumn({type: 'string', role: 'tooltip'});
            data.addColumn({type: 'string', role: 'style'}); // For coloring

            marketData.efficiency.forEach(item => {
                const color = item.is_me ? '#4285F4' : '#EA4335';
                const tooltip = `${item.brand}\nRank: ${item.rank}\nShare: ${item.share}%\n${item.title.substring(0,20)}...`;
                data.addRow([item.rank, item.share, tooltip, `point { fill-color: ${color}; size: 10; }`]);
            });

            const options = {
                title: 'Eficiencia: Rank vs Click Share (Última Semana)',
                hAxis: {title: 'Organic Rank (Invertido)', direction: -1, minValue: 1},
                vAxis: {title: 'Click Share (%)'},
                legend: 'none',
                chartArea: {width: '85%', height: '70%'},
                tooltip: {isHtml: true}
            };

            const chart = new google.visualization.ScatterChart(document.getElementById('efficiency_chart'));
            chart.draw(data, options);
        }

                "Alerta": "bg-red-100 text-red-800",
                "Precio": "bg-green-100 text-green-800",
                "Amenaza": "bg-orange-100 text-orange-800"
            };
            // Simple string match to pick color
            let style = "bg-gray-100 text-gray-800";
            if (type.includes("Tendencia") || type.includes("Positiva")) style = styles["Tendencia"];
            if (type.includes("Alerta") || type.includes("Riesgo")) style = styles["Alerta"];
            if (type.includes("Precio") || type.includes("Premium")) style = styles["Precio"];
            if (type.includes("Amenaza")) style = styles["Amenaza"];

            return <span className={`px-2 py-1 rounded text-xs font-semibold mr-2 ${style}`}>Insight</span>;
        }

                                    </li>
                                ))}

                        </div>
                    </div>
                </div>
            );
        };

        const InteractiveReport = () => {

            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
